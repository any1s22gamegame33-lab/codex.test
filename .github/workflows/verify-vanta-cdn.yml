name: Verify VANTA BLOOM CDN

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify hosted game assets
        shell: bash
        run: |
          set -euo pipefail
          BASE="https://cdn.jsdelivr.net/gh/any1s22gamegame33-lab/codex.test@3b2e38e9bc20aa5d86630bb92ec00f0c0f42cf56/vanta-bloom"
          for file in index.html styles.css game1.js game2.js game3.js game4.js; do
            code=$(curl --location --silent --show-error --output "/tmp/$file" --write-out "%{http_code}" "$BASE/$file")
            echo "$file HTTP $code SIZE $(wc -c < "/tmp/$file")"
            test "$code" = "200"
            test -s "/tmp/$file"
          done
          grep -q "VANTA BLOOM" /tmp/index.html
          grep -q "game1.js" /tmp/index.html
          grep -q "game4.js" /tmp/index.html
          node --check /tmp/game1.js
          node --check /tmp/game2.js
          node --check /tmp/game3.js
          node --check /tmp/game4.js
          echo "CDN_GAME_OK"
