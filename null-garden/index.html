ght:20px;bottom:calc(24px + env(safe-area-inset-bottom));width:82px;height:82px;border-radius:50%;pointer-events:auto;border:1px solid #ffffff2b;background:#12161dcc;color:#eee9df;font-weight:900;letter-spacing:.08em}.dash.ready{box-shadow:0 0 0 5px #e9bd6318}.screen{position:fixed;inset:0;z-index:5;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 50% 30%,#526b6a44,transparent 34%),#0b0e12e8;backdrop-filter:blur(4px)}.hide{display:none}.card{width:min(92vw,480px);padding:25px;border:1px solid #ffffff24;border-radius:28px;background:#11151ae8;box-shadow:0 25px 70px #0009}.eye{color:#e9bd63;font-size:9px;font-weight:900;letter-spacing:.22em}h1{margin:12px 0;font-size:clamp(45px,14vw,76px);line-height:.86;letter-spacing:-.06em}h1 span{display:block;color:#91b7b4}.lead{color:#c8c5bd;font-size:12px;line-height:1.8}.rules{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:18px 0}.rules div{padding:11px 5px;border:1px solid #ffffff20;border-radius:15px;text-align:center}.rules b{display:block;font-size:20px}.rules small{color:#9ca2a5;font-size:8px}.go{width:100%;height:52px;border:0;border-radius:16px;background:#eee9df;color:#11151a;font-weight:900;letter-spacing:.1em}.retry{margin-top:8px;width:100%;height:48px;border:1px solid #ffffff24;border-radius:16px;background:transparent;color:#eee9df;font-weight:800}@media(orientation:landscape) and (max-height:500px){.card{transform:scale(.82)}}</style></head><body><canvas id="c"></canvas><div class="ui"><div class="brand">NULL GARDEN</div><div class="score"><span id="sc">000000</span><small>SCORE</small></div><div id="core" class="core" style="--hp:100%"><span id="hp">100</span></div><div id="msg" class="msg"><b></b><p></p></div></div><div id="joy" class="joy"><div id="knob" class="knob"></div></div><button id="dash" class="dash">DASH</button><div id="start" class="screen"><div class="card"><div class="eye">MATTE SOFTWARE 3D / MOBILE</div><h1>NULL<span>GARDEN</span></h1><p class="lead">金色のECHOを集め、3つの塔を目覚めさせる。赤い追跡者を避け、静かな世界に色を取り戻せ。</p><div class="rules"><div><b>◌</b><small>MOVE</small></div><div><b>◇</b><small>ECHO</small></div><div><b>↯</b><small>DASH</small></div></div><button id="go" class="go">世界に入る</button></div></div><div id="end" class="screen hide"><div class="card"><div id="endEye" class="eye"></div><h1 id="endTitle" style="font-size:48px"></h1><p id="endText" class="lead"></p><button id="again" class="go">もう一度</button></div></div><script>(function(){'use strict';var d=document,c=d.getElementById('c'),x=c.getContext('2d'),W,H,R=1,state=0,t=0,last=performance.now(),score=0,aw=0,got=0,shake=0,flash=0,P,B,E,N,T,Q=[],stars=[],joy={x:0,y:0,id:-1},cam={x:0,y:9,z:18,a:Math.PI,p:-.54};function el(i){return d.getElementById(i)}function resize(){R=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*R;c.height=H*R;x.setTransform(R,0,0,R,0,0)}addEventListener('resize',resize);resize();function rnd(a,b){return(b||0)+Math.random()*(a-(b||0))}function cl(v,a,b){return Math.max(a,Math.min(b,v))}function setup(){P={x:0,z:12,vx:0,vz:0,a:Math.PI,hp:100,d:0,inv:0,tr:[]};B=[];E=[];N=[];T=[{x:-20,z:-18,on:0},{x:20,z:-18,on:0},{x:0,z:23,on:0}];Q=[];stars=[];score=aw=got=t=0;for(var i=0;i<70;i++)stars.push({x:Math.random(),y:Math.random()*.55,r:rnd(1.3,.3),a:rnd(.7,.15)});for(i=0;i<48;i++){var bx,bz,s,h,ok=0;while(!ok){bx=rnd(56,-56);bz=rnd(56,-56);s=rnd(2.5,1.1);h=rnd(5.2,.8);ok=Math.hypot(bx,bz)>10}B.push({x:bx,z:bz,s:s,h:h,r:rnd(6.28),blue:Math.random()<.22})}spawnE(15);for(i=0;i<5;i++){var a=rnd(6.28),r=rnd(40,25);N.push({x:Math.cos(a)*r,z:Math.sin(a)*r,vx:0,vz:0,p:rnd(6.28),st:0})}ui()}function spawnE(n){for(var k=0;k<n;k++){var ex,ez,ok=0;while(!ok){ex=rnd(52,-52);ez=rnd(52,-52);ok=Math.hypot(ex-P.x,ez-P.z)>7}E.push({x:ex,z:ez,p:rnd(6.28),on:1})}}function ui(){el('sc').textContent=('000000'+(score|0)).slice(-6);el('hp').textContent=Math.max(0,Math.ceil(P.hp));el('core').style.setProperty('--hp',cl(P.hp,0,100)+'%');el('dash').className='dash'+(P.d<=0?' ready':'')}var mt;function msg(a,b){var m=el('msg');m.children[0].textContent=a;m.children[1].textContent=b;m.className='msg on';clearTimeout(mt);mt=setTimeout(function(){m.className='msg'},900)}function burst(px,py,pz,col,n){for(var i=0;i<n;i++){var a=rnd(6.28),s=rnd(7,1);Q.push({x:px,y:py,z:pz,vx:Math.cos(a)*s,vy:rnd(5,1),vz:Math.sin(a)*s,l:rnd(1,.4),c:col,r:rnd(.16,.05)})}}function start(){setup();state=1;el('start').className='screen hide';el('end').className='screen hide';msg('ENTER','ECHOを5つ集めろ')}el('go').onclick=start;el('again').onclick=start;function dash(){if(state!=1||P.d>0)return;var ix=joy.x,iz=joy.y,m=Math.hypot(ix,iz);if(m<.2){ix=Math.sin(P.a);iz=Math.cos(P.a);m=1}P.vx+=ix/m*15;P.vz+=iz/m*15;P.d=2;P.inv=.35;burst(P.x,.6,P.z,'#e9bd63',22);shake=.25}el('dash').ontouchstart=function(e){e.preventDefault();dash()};el('dash').onclick=dash;var j=el('joy'),kn=el('knob');function jm(e){var q=e.changedTouches[0],r=j.getBoundingClientRect(),dx=q.clientX-r.left-r.width/2,dy=q.clientY-r.top-r.height/2,m=Math.hypot(dx,dy)||1,k=Math.min(1,m/39);joy.x=dx/m*k;joy.y=dy/m*k;kn.style.transform='translate(calc(-50% + '+joy.x*39+'px),calc(-50% + '+joy.y*39+'px))'}j.ontouchstart=function(e){e.preventDefault();joy.id=e.changedTouches[0].identifier;jm(e)};j.ontouchmove=function(e){e.preventDefault();jm(e)};j.ontouchend=j.ontouchcancel=function(){joy.x=joy.y=0;kn.style.transform='translate(-50%,-50%)'};function col(nx,nz,r){for(var i=0;i<B.length;i++){var b=B[i],dx=nx-b.x,dz=nz-b.z,l=b.s+r;if(Math.abs(dx)<l&&Math.abs(dz)<l){if(Math.abs(dx)>Math.abs(dz))nx=b.x+(dx<0?-l:l);else nz=b.z+(dz<0?-l:l)}}return[cl(nx,-60,60),cl(nz,-60,60)]}function tower(){var a=T.filter(function(v){return!v.on});a.sort(function(u,v){return(u.x-P.x)*(u.x-P.x)+(u.z-P.z)*(u.z-P.z)-((v.x-P.x)*(v.x-P.x)+(v.z-P.z)*(v.z-P.z))});if(!a.length)return;a[0].on=1;aw++;score+=700*aw;burst(a[0].x,3,a[0].z,'#7fcac6',55);flash=.8;shake=.5;msg('TOWER '+aw+'/3','世界に色が戻る');if(aw==3)setTimeout(function(){finish(1)},800)}function finish(win){if(state!=1)return;state=2;el('end').className='screen';el('endEye').textContent=win?'THE GARDEN REMEMBERS':'THE SIGNAL FADES';el('endTitle').textContent=win?'AWAKENED':'SILENCED';el('endText').textContent=win?'3つの塔が目覚め、無音の世界に脈動が戻った。':'COREは沈黙した。世界は次の侵入者を待っている。'}function update(dt){if(state!=1)return;t+=dt;P.d=Math.max(0,P.d-dt);P.inv=Math.max(0,P.inv-dt);P.vx+=joy.x*20*dt;P.vz+=joy.y*20*dt;var drag=Math.pow(.035,dt);P.vx*=drag;P.vz*=drag;var z=col(P.x+P.vx*dt,P.z+P.vz*dt,.7);P.x=z[0];P.z=z[1];if(Math.hypot(P.vx,P.vz)>.4)P.a=Math.atan2(P.vx,P.vz);P.tr.unshift({x:P.x,z:P.z});if(P.tr.length>12)P.tr.pop();for(var i=0;i<E.length;i++){var e=E[i];if(e.on&&(e.x-P.x)*(e.x-P.x)+(e.z-P.z)*(e.z-P.z)<2){e.on=0;got++;score+=100;burst(e.x,1,e.z,'#e9bd63',20);if(got%5==0)tower();else msg('ECHO '+got%5+'/5','TOTAL '+got);if(E.filter(function(v){return v.on}).length<5)spawnE(6)}}for(i=0;i<N.length;i++){var n=N[i],dx=P.x-n.x,dz=P.z-n.z,di=Math.hypot(dx,dz)||1,sp=2.1+aw*.35;n.st=Math.max(0,n.st-dt);n.vx+=(dx/di*sp-n.vx)*dt*1.7;n.vz+=(dz/di*sp-n.vz)*dt*1.7;z=col(n.x+n.vx*dt,n.z+n.vz*dt,.6);n.x=z[0];n.z=z[1];if(di<1.4&&P.inv<=0){P.hp-=18;P.inv=1;n.st=.7;P.vx+=dx/di*10;P.vz+=dz/di*10;burst(P.x,.6,P.z,'#d95f59',26);shake=.6;flash=.4;msg('CORE HIT',Math.max(0,Math.ceil(P.hp))+'%');if(P.hp<=0)finish(0)}}for(i=Q.length-1;i>=0;i--){var q=Q[i];q.l-=dt;q.vy-=5*dt;q.x+=q.vx*dt;q.y+=q.vy*dt;q.z+=q.vz*dt;if(q.l<=0)Q.splice(i,1)}score+=dt*3;shake=Math.max(0,shake-dt*2);flash=Math.max(0,flash-dt*2);ui()}function cp(p){var dx=p.x-cam.x,dy=p.y-cam.y,dz=p.z-cam.z,ca=Math.cos(cam.a),sa=Math.sin(cam.a),xx=dx*ca-dz*sa,zz=dx*sa+dz*ca,cc=Math.cos(cam.p),ss=Math.sin(cam.p);return{x:xx,y:dy*cc-zz*ss,z:dy*ss+zz*cc}}function pr(p){var a=cp(p);if(a.z<.3)return null;var f=Math.min(W,H)*1.05;return{x:W/2+a.x*f/a.z,y:H*.49-a.y*f/a.z,s:f/a.z,z:a.z}}var D=[];function poly(a,c,k){var p=a.map(pr);if(p.some(function(v){return!v}))return;var dep=p.reduce(function(s,v){return s+v.z},0)/p.length;D.push({d:dep,f:function(){x.fillStyle=shade(c,k);x.beginPath();x.moveTo(p[0].x,p[0].y);for(var i=1;i<p.length;i++)x.lineTo(p[i].x,p[i].y);x.closePath();x.fill()}})}function shade(c,k){var n=parseInt(c.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;return'rgb('+(cl(r*k,0,255)|0)+','+(cl(g*k,0,255)|0)+','+(cl(b*k,0,255)|0)+')'}function box(px,py,pz,sx,sy,sz,c,r){var ca=Math.cos(r||0),sa=Math.sin(r||0),a=[];[-sy,sy].forEach(function(Y){[-sz,sz].forEach(function(Z){[-sx,sx].forEach(function(X){a.push({x:px+X*ca-Z*sa,y:py+Y,z:pz+X*sa+Z*ca})})})});function id(Y,Z,X){return(Y?4:0)+(Z?2:0)+(X?1:0)}poly([a[id(1,0,0)],a[id(1,0,1)],a[id(1,1,1)],a[id(1,1,0)]],c,1.08);poly([a[id(0,1,0)],a[id(0,1,1)],a[id(1,1,1)],a[id(1,1,0)]],c,.68);poly([a[id(0,0,1)],a[id(0,1,1)],a[id(1,1,1)],a[id(1,0,1)]],c,.83);poly([a[id(0,0,0)],a[id(0,0,1)],a[id(1,0,1)],a[id(1,0,0)]],c,.56)}function ball(px,py,pz,r,c){var p=pr({x:px,y:py,z:pz});if(!p)return;D.push({d:p.z,f:function(){var z=r*p.s,g=x.createRadialGradient(p.x-z*.3,p.y-z*.3,1,p.x,p.y,z);g.addColorStop(0,shade(c,1.25));g.addColorStop(1,shade(c,.45));x.fillStyle=g;x.beginPath();x.arc(p.x,p.y,z,0,6.28);x.fill()}})}function dia(px,py,pz,r,h,c,a){var ring=[],i;for(i=0;i<4;i++)ring.push({x:px+Math.cos(a+i*1.57)*r,y:py,z:pz+Math.sin(a+i*1.57)*r});var top={x:px,y:py+h,z:pz},bot={x:px,y:py-h,z:pz};for(i=0;i<4;i++){poly([top,ring[i],ring[(i+1)%4]],c,1-i*.06);poly([bot,ring[(i+1)%4],ring[i]],c,.65+i*.04)}}function render(){var g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#232932');g.addColorStop(1,'#0d1116');x.fillStyle=g;x.fillRect(0,0,W,H);for(var i=0;i<stars.length;i++){var s=stars[i];x.globalAlpha=s.a;x.fillStyle='#cbd7da';x.beginPath();x.arc(s.x*W,s.y*H,s.r,0,6.28);x.fill()}x.globalAlpha=1;cam.a+=(P.a-cam.a)*.04;cam.x+=(P.x-Math.sin(cam.a)*13-cam.x)*.07;cam.z+=(P.z-Math.cos(cam.a)*13-cam.z)*.07;cam.y+=(9-cam.y)*.05;cam.x+=(Math.random()-.5)*shake;D=[];box(0,-.65,0,63,.5,63,'#292d2c',0);for(i=0;i<B.length;i++){var b=B[i];box(b.x,b.h/2,b.z,b.s,b.h/2,b.s,b.blue?'#40575c':'#22272d',b.r);box(b.x,b.h+.05,b.z,b.s*.86,.06,b.s*.86,b.blue?'#6b9f9c':'#444842',b.r)}for(i=0;i<T.length;i++){var u=T[i];box(u.x,1.6,u.z,2.4,1.7,2.4,'#22272d',.2);box(u.x,4,u.z,1.1,1.6,1.1,u.on?'#67aaa7':'#bdb8ad',-.2);dia(u.x,6+Math.sin(t*2+i)*.2,u.z,.8,1.3,u.on?'#e9bd63':'#4c504d',t*.6)}for(i=0;i<E.length;i++)if(E[i].on)dia(E[i].x,1.2+Math.sin(t*2+E[i].p)*.2,E[i].z,.32,.65,'#e9bd63',t);for(i=0;i<N.length;i++)ball(N[i].x,.8+Math.sin(t*3+N[i].p)*.12,N[i].z,.72,'#d95f59');for(i=0;i<P.tr.length;i+=2)ball(P.tr[i].x,.08,P.tr[i].z,.18,'#4d7775');if(!(P.inv>0&&((t*14)|0)%2==0))ball(P.x,.82,P.z,.72,'#eee9df');for(i=0;i<Q.length;i++)ball(Q[i].x,Q[i].y,Q[i].z,Q[i].r,Q[i].c);D.sort(function(a,b){return b.d-a.d});for(i=0;i<D.length;i++)D[i].f();if(flash){x.fillStyle='rgba(240,236,225,'+flash*.13+')';x.fillRect(0,0,W,H)}}function loop(now){var dt=Math.min(.033,(now-last)/1000);last=now;if(!state)t+=dt;update(dt);render();requestAnimationFrame(loop)}setup();requestAnimationFrame(loop)})();</script></body></html>
